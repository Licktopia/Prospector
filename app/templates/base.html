<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Prospector{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        [htmx-indicator] { display: none; }
        .htmx-request [htmx-indicator] { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Nav -->
    <nav class="bg-white border-b border-gray-200 px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-gray-900">Prospector</a>
            <div class="flex items-center gap-4">
                {% if profiles %}
                <select
                    id="profile-selector"
                    class="border border-gray-300 rounded-md px-3 py-1.5 text-sm bg-white"
                    onchange="window.location.href='/?profile_id=' + this.value"
                >
                    {% for p in profiles %}
                    <option value="{{ p.id }}" {% if current_profile and current_profile.id == p.id %}selected{% endif %}>
                        {{ p.name }}
                    </option>
                    {% endfor %}
                </select>
                {% endif %}
                <a href="/profiles" class="text-sm text-gray-600 hover:text-gray-900">Manage Profiles</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-6 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
